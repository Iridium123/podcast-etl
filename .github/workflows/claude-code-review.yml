name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    # Auto-run for repo owner and dependabot; otherwise require /review comment from owner
    if: |
      (github.event_name == 'pull_request' && (
        github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.user.login == 'dependabot[bot]'
      )) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/review') &&
        github.event.comment.author_association == 'OWNER'
      )

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha || github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number || github.event.issue.number }} in ${{ github.repository }}.
            Read the full diff with gh pr diff. Review the changes for bugs, security issues, and code quality.
            Submit your review using gh pr review with --approve, --request-changes, or --comment as appropriate.
            Always submit a review, even if everything looks good.

