name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]

jobs:
  resolve-outdated:
    # Have Claude check outdated review threads and resolve ones that are addressed
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'synchronize' &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.user.login == 'dependabot[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch outdated unresolved threads
        id: fetch-threads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          threads=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 100) {
                    nodes {
                      id
                      isResolved
                      isOutdated
                      path
                      line
                      comments(first: 10) {
                        nodes {
                          body
                          author { login }
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -f owner="${{ github.repository_owner }}" \
            -f repo="${{ github.event.repository.name }}" \
            -F pr=${{ github.event.pull_request.number }})

          # Filter to outdated + unresolved
          filtered=$(echo "$threads" | jq '[
            .data.repository.pullRequest.reviewThreads.nodes[]
            | select(.isOutdated == true and .isResolved == false)
          ]')

          count=$(echo "$filtered" | jq 'length')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "$filtered" > /tmp/outdated-threads.json
          echo "Found $count outdated unresolved threads"

      - name: Resolve addressed review threads
        if: steps.fetch-threads.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            New commits have been pushed to this PR. Your job is to check outdated review
            threads and resolve ONLY the ones whose feedback has actually been addressed
            in the current code. The PR branch is already checked out.

            ## Outdated unresolved threads

            The following threads have been marked outdated by GitHub (the code they
            referenced has changed). They are in /tmp/outdated-threads.json — read that
            file to get the thread IDs, file paths, line numbers, and comment bodies.

            ## For each thread

            1. Read the comment body to understand what was requested
            2. Read the current version of the file at the referenced path
            3. Determine whether the feedback has been addressed in the current code:
               - If the requested change was made → resolve
               - If the code was deleted/moved and the concern no longer applies → resolve
               - If the concern is still valid and unaddressed → leave open

            ## Resolving threads

            For each thread you determine is addressed, run this exact command
            (substituting only the thread ID):

            ```
            gh api graphql -f query='
              mutation($threadId: ID!) {
                resolveReviewThread(input: {threadId: $threadId}) {
                  thread { isResolved }
                }
              }
            ' -f threadId="THREAD_ID"
            ```

            Do NOT resolve threads where the feedback is still relevant.
            Do NOT leave any comments or replies — just resolve silently.
            Do NOT make any code changes.

          claude_args: |
            --allowedTools "Read,Bash(gh api graphql -f query*resolveReviewThread*)"

  claude-review:
    # Auto-run for repo owner and dependabot; otherwise require /review comment from owner
    if: |
      (github.event_name == 'pull_request' && (
        github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.user.login == 'dependabot[bot]'
      )) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/review') &&
        github.event.comment.author_association == 'OWNER'
      )

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          allowed_bots: "dependabot[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.
            Always leave a review comment, even if everything looks good.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
