name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build test image
        run: docker build --target test -t podcast-etl-test .
      - name: Run tests
        run: docker run --rm -e GITHUB_ACTIONS=true podcast-etl-test
