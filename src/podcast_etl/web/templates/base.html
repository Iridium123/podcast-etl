<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}podcast-etl{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3">
        <div class="flex items-center gap-6">
            <span class="text-lg font-semibold">podcast-etl</span>
            <a href="/" class="text-gray-300 hover:text-white">Dashboard</a>
            <a href="/feeds" class="text-gray-300 hover:text-white">Feeds</a>
            <a href="/defaults" class="text-gray-300 hover:text-white">Defaults</a>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
